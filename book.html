<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Love Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <div class="city-name" id="cityName">Loading...</div>
    <button class="back-button" onclick="goToMap()">← Back to Map</button>
</div>

<div class="book-container" id="bookContainer">
    <div class="loading">Loading memories...</div>
</div>

<div class="navigation" id="navigation" style="display:none;">
    <button class="nav-button" id="prevButton" onclick="previousPage()">← Previous</button>
    <div class="page-indicator" id="pageIndicator">1 / 1</div>
    <button class="nav-button" id="nextButton" onclick="nextPage()">Next →</button>
</div>

<script src="script.js"></script>

<script>
let currentPage = 0;
let pages = [];
let mediaFiles = [];

const loveQuotes = [
    "Say you'll never ever leave from beside me.",
    "'Cause I want ya, and I need ya",
    
    "Distance means nothing when someone means everything.",
    "In your smile, I see something more beautiful than the stars.",
    "You are my today and all of my tomorrows."
];

// ==========================
// GET CITY
// ==========================
function getCityFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('city');
}

// ==========================
// LOAD MEDIA (REAL DETECTION)
// ==========================
function loadMediaFiles(cityName) {
    return new Promise((resolve) => {

        const city = cityName.toLowerCase();
        const extensions = ['jpg','jpeg','png','webp','mp4','webm'];
        const files = [];
        let index = 1;

        function tryFile() {
            let extIndex = 0;
            let found = false;

            function tryExtension() {
                if (extIndex >= extensions.length) {
                    if (!found) {
                        resolve(files);
                        return;
                    }
                }

                const ext = extensions[extIndex];
                const path = `assets/photos/${city}/${index}.${ext}`;
                const type = detectMediaType(path);

                const testElement = type === 'video'
                    ? document.createElement('video')
                    : document.createElement('img');

                testElement.src = path;

                testElement.onload = () => {
                    files.push({ path });
                    index++;
                    tryFile();
                };

                testElement.onloadeddata = () => {
                    files.push({ path });
                    index++;
                    tryFile();
                };

                testElement.onerror = () => {
                    extIndex++;
                    tryExtension();
                };
            }

            tryExtension();
        }

        tryFile();
    });
}

// ==========================
// CREATE PAGE
// ==========================
function createPage(mediaFile, quote, index) {

    const page = document.createElement('div');
    page.className = 'book-page';
    if (index === 0) page.classList.add('active');

    const left = document.createElement('div');
    left.className = 'page-left';

    const mediaContainer = document.createElement('div');
    mediaContainer.className = 'media-container';

    const mediaElement = renderMedia(
        mediaContainer,
        mediaFile.path,
        '',
        { controls: true }
    );

    makeMediaResponsive(mediaElement);

    left.appendChild(mediaContainer);

    const right = document.createElement('div');
    right.className = 'page-right';

    const quoteDiv = document.createElement('div');
    quoteDiv.className = 'love-quote';
    quoteDiv.textContent = quote;

    right.appendChild(quoteDiv);

    page.appendChild(left);
    page.appendChild(right);

    return page;
}

// ==========================
// INIT BOOK
// ==========================
async function initBook() {

    const cityName = getCityFromURL();

    if (!cityName) {
        document.getElementById('bookContainer').innerHTML =
            '<div class="error">City not specified.</div>';
        return;
    }

    document.getElementById('cityName').textContent = cityName.toUpperCase();

    mediaFiles = await loadMediaFiles(cityName);

    if (mediaFiles.length === 0) {
        document.getElementById('bookContainer').innerHTML =
            `<div class="error">No photos found for ${cityName}</div>`;
        return;
    }

    const container = document.getElementById('bookContainer');
    container.innerHTML = '';

    pages = mediaFiles.map((file, index) => {
        const quote = loveQuotes[index % loveQuotes.length];
        const page = createPage(file, quote, index);
        container.appendChild(page);
        return page;
    });

    document.getElementById('navigation').style.display = 'flex';
    updateNavigation();
}

// ==========================
// NAVIGATION
// ==========================
function updateNavigation() {
    document.getElementById('prevButton').disabled = currentPage === 0;
    document.getElementById('nextButton').disabled = currentPage === pages.length - 1;
    document.getElementById('pageIndicator').textContent =
        `${currentPage + 1} / ${pages.length}`;
}

function nextPage() {
    if (currentPage < pages.length - 1) {
        pages[currentPage].classList.remove('active');
        currentPage++;
        pages[currentPage].classList.add('active');
        updateNavigation();
    }
}

function previousPage() {
    if (currentPage > 0) {
        pages[currentPage].classList.remove('active');
        currentPage--;
        pages[currentPage].classList.add('active');
        updateNavigation();
    }
}

function goToMap() {
    window.location.href = 'map.html';
}

window.addEventListener('load', initBook);
</script>

</body>
</html>
