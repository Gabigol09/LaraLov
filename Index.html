<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESS START</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }

        .heart-container {
            position: relative;
            width: 200px;
            height: 200px;
            aspect-ratio: 1 / 1;
            margin-bottom: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .press-start {
            color: #ffffff;
            font-size: 48px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 
                4px 4px 0px #333333,
                8px 8px 0px #666666;
            animation: blink 1.5s infinite;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        @keyframes blink {
            0%, 50% {
                opacity: 1;
            }
            51%, 100% {
                opacity: 0.3;
            }
        }

        /* Pixelated effect for retro look */
        .press-start {
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        /* Floating heart item animation with 3D rotation */
        .heart-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transform-style: preserve-3d;
            perspective: 1000px;
            animation: floatVertical 3s ease-in-out infinite;
            will-change: transform;
        }

        #heart {
            position: relative;
            transform-origin: center center;
            width: 80px;
            height: 80px;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            backface-visibility: hidden;
            transform-style: preserve-3d;
            animation: rotateY3D 3s linear infinite;
            will-change: transform;
        }

        @keyframes floatVertical {
            0%, 100% {
                transform: translate(-50%, -50%) translateY(0px);
            }
            50% {
                transform: translate(-50%, -50%) translateY(-15px);
            }
        }

        @keyframes rotateY3D {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="heart-container">
        <div class="heart-wrapper">
            <img id="heart" src="assets/photos/heart.png" alt="heart">
        </div>
    </div>
    <div class="press-start">PRESS START</div>

    <script>
        document.addEventListener('click', function() {
            window.location.href = 'map.html';
        });

        // Also support keyboard Enter/Space for accessibility
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                window.location.href = 'map.html';
            }
        });
    </script>
</body>
</html>
