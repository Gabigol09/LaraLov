<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            position: relative;
        }

        .map-container {
            width: 100%;
            height: 100%;
            position: relative;
            background-image: url('assets/map/minecraft_map.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .city-marker {
            position: absolute;
            padding: 8px 16px;
            border: 2px solid #ffffff;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .city-marker:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 
                0 0 20px rgba(255, 255, 255, 0.8),
                0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .city-marker:active {
            transform: translate(-50%, -50%) scale(1.05);
        }

        .city-marker.locked {
            opacity: 0.6;
            filter: grayscale(100%);
            background-color: rgba(64, 64, 64, 0.4);
            border-color: #666666;
            cursor: not-allowed;
        }

        .city-marker.locked:hover {
            background-color: rgba(64, 64, 64, 0.4);
            border-color: #666666;
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 
                0 0 20px rgba(255, 255, 255, 0.8),
                0 2px 8px rgba(0, 0, 0, 0.5);
        }

        /* Position the city markers */
        #campinas {
            top: 37%;
            left: 34%;
            transform: translate(-50%, -50%);
        }

        #sjc {
            top: 75%;
            left: 22%;
            transform: translate(-50%, -50%);
            cursor: not-allowed;
        }

        #caragua {
            top: 38%;
            left: 77%;
            transform: translate(-50%, -50%);
        }

        #jacarei {
            top: 76%;
            left: 55%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="map-container">
        <div id="campinas" class="city-marker" onclick="goToCity('campinas')">
            CAMPINAS
        </div>
        <div id="sjc" class="city-marker locked">
            SJC
        </div>
        <div id="jacarei" class="city-marker" onclick="goToCity('jacarei')">
            JACAREÍ
        </div>
        <div id="caragua" class="city-marker" onclick="goToCity('caragua')">
            CARAGUÁ
        </div>
    </div>

    <script>
        function goToCity(cityName) {
            window.location.href = `book.html?city=${cityName}`;
        }

        // Prevent clicks on SJC
        document.getElementById("sjc").addEventListener("click", function(e) {
            e.preventDefault();
            e.stopPropagation();
        });
    </script>
</body>
</html>
